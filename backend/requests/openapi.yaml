openapi: 3.0.3
info:
  title: ParaSempre API
  description: Wedding Guest Management API
  version: 1.0.0
  contact:
    name: ParaSempre

servers:
  - url: http://localhost:8080
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Guest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string
        relationship:
          type: string
          enum: [P, R]
        confirmed:
          type: boolean
        family_group:
          type: integer
          format: int64
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateGuestInput:
      type: object
      required:
        - first_name
        - last_name
        - relationship
      properties:
        first_name:
          type: string
        last_name:
          type: string
        relationship:
          type: string
          enum: [P, R]
        family_group:
          type: integer
          format: int64
        phone:
          type: string

    UpdateGuestInput:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        relationship:
          type: string
          enum: [P, R]
        confirmed:
          type: boolean
        family_group:
          type: integer
          format: int64

    PagedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Guest'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    OTPRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string

    OTPVerifyRequest:
      type: object
      required:
        - phone
        - code
      properties:
        phone:
          type: string
        code:
          type: string

    ImportResponse:
      type: object
      properties:
        success_count:
          type: integer
        error_count:
          type: integer
        total:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              error:
                type: string

paths:
  /api/auth/otp/send:
    post:
      tags:
        - Auth
      summary: Send OTP via WhatsApp
      description: Sends a one-time password to the provided phone number via WhatsApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
            example:
              phone: "43998082450"
      responses:
        '200':
          description: OTP sent successfully
        '400':
          description: Invalid phone number

  /api/auth/otp/verify:
    post:
      tags:
        - Auth
      summary: Verify OTP
      description: Verifies the OTP code and returns a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPVerifyRequest'
            example:
              phone: "43998082450"
              code: "309821"
      responses:
        '200':
          description: Verification successful, returns JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '400':
          description: Invalid code

  /api/guests:
    get:
      tags:
        - Guests
      summary: List all guests
      description: Returns a paginated list of guests
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of guests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'

    post:
      tags:
        - Guests
      summary: Create guest
      description: |
        Creates a new guest. If no family_group is provided, one is auto-assigned.
        If phone is provided, a linked user is created automatically.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuestInput'
            examples:
              basic:
                summary: Basic guest (auto-assign family)
                value:
                  first_name: "Test"
                  last_name: "Guest"
                  relationship: "P"
              withPhone:
                summary: With phone (creates user)
                value:
                  first_name: "Fernando"
                  last_name: "Junior"
                  relationship: "P"
                  phone: "43999999999"
              withFamily:
                summary: With existing family
                value:
                  first_name: "Joao"
                  last_name: "Pessoa"
                  relationship: "P"
                  phone: "43911111111"
                  family_group: 1
      responses:
        '201':
          description: Guest created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'
        '400':
          description: Invalid input

  /api/guests/{id}:
    get:
      tags:
        - Guests
      summary: Get guest by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Guest found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'
        '404':
          description: Guest not found

    put:
      tags:
        - Guests
      summary: Update guest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGuestInput'
      responses:
        '200':
          description: Guest updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'

    delete:
      tags:
        - Guests
      summary: Delete guest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Guest deleted
        '404':
          description: Guest not found

  /api/guests/import:
    post:
      tags:
        - Guests
      summary: Import guests from CSV
      description: Bulk import guests from a CSV file
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponse'

  /api/guests/{id}/confirm:
    patch:
      tags:
        - Guests
      summary: Confirm guest attendance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Guest confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'

  /api/guests/{id}/cancel:
    patch:
      tags:
        - Guests
      summary: Cancel guest attendance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Guest cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'

  /api/guests/phone/{phone}/confirm:
    patch:
      tags:
        - Guests
      summary: Confirm guest by phone
      security:
        - BearerAuth: []
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Guest confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'

  /api/guests/phone/{phone}/cancel:
    patch:
      tags:
        - Guests
      summary: Cancel guest by phone
      security:
        - BearerAuth: []
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Guest cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'

  /api/guests/family/{familyGroup}/confirm:
    patch:
      tags:
        - Guests
      summary: Confirm all guests in family group
      description: Confirms attendance for all guests in the specified family group
      security:
        - BearerAuth: []
      parameters:
        - name: familyGroup
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Family confirmed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Guest'

  /api/guests/family/{familyGroup}/cancel:
    patch:
      tags:
        - Guests
      summary: Cancel all guests in family group
      description: Cancels attendance for all guests in the specified family group
      security:
        - BearerAuth: []
      parameters:
        - name: familyGroup
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Family cancelled
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Guest'

  /api/guests/family/phone/{phone}/confirm:
    patch:
      tags:
        - Guests
      summary: Confirm family by phone
      description: Confirms all guests in the family of the guest with the specified phone
      security:
        - BearerAuth: []
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Family confirmed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Guest'

  /api/guests/family/phone/{phone}/cancel:
    patch:
      tags:
        - Guests
      summary: Cancel family by phone
      description: Cancels all guests in the family of the guest with the specified phone
      security:
        - BearerAuth: []
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Family cancelled
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Guest'

  /api/users/check:
    get:
      tags:
        - Users
      summary: Check if user exists
      parameters:
        - name: phone
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User exists check result

  /api/users/me:
    get:
      tags:
        - Users
      summary: Get current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user data
