name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      backend_integration: ${{ steps.filter.outputs.backend_integration }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            backend_integration:
              - 'backend/internal/**/*integration_test.go'
              - 'backend/internal/**/repository_postgres.go'
              - 'backend/internal/database/**'
              - 'backend/migrations/**'
              - 'backend/Makefile'
              - 'backend/go.mod'
              - 'backend/go.sum'
            migrations:
              - 'backend/migrations/**/*.sql'
            frontend:
              - 'frontend/**'

  backend:
    name: Backend
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build
        run: go build ./cmd/server

      - name: Test
        run: go test ./... -v -count=1

  backend-integration:
    name: Backend Integration
    needs: changes
    if: ${{ needs.changes.outputs.backend_integration == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: parasempre_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d parasempre_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: parasempre_test
      DB_SSLMODE: disable
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Migrate test database
        run: make migrate

      - name: Integration tests
        run: make test-integration

  migration-rls-check:
    name: Migration RLS Check
    needs: changes
    if: ${{ needs.changes.outputs.migrations == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check RLS on CREATE TABLE migrations
        run: |
          failed=0
          for file in backend/migrations/*.sql; do
            if grep -qi 'CREATE TABLE' "$file" && ! grep -qi 'ENABLE ROW LEVEL SECURITY' "$file"; then
              echo "::error file=$file::Missing ENABLE ROW LEVEL SECURITY in $file"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "All CREATE TABLE migrations must include ALTER TABLE <name> ENABLE ROW LEVEL SECURITY for Supabase."
            exit 1
          fi
          echo "All CREATE TABLE migrations have RLS enabled."

  frontend:
    name: Frontend
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
